        const firebaseConfig = {

            projectId: "smurf2exam",

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        // Every student's result is one Firestore document, and the document ID
        // IS the student's UID. That's what makes UID uniqueness possible:
        // Firestore document IDs are unique by definition, so two students can
        // never silently share one record, and a duplicate submission attempt
        // can be caught deterministically (see submitQuizAnswers below).

        // ------------------ EXAM DATABASE (15 Questions) ------------------
        const EXAM_QUESTIONS = [
            { id: 1,  qText: "ไฝที่ปากของกีรติอยู่ที่ไหน", code: null, options: [{key:"ก",text:"หน้าผาก"},

            { id: 3,  qText: "กลุ่มสเมิร์ฟทูสร้างขึ้นปีไหน", code: null, options: [{key:"ก",text:"ป.1"},

            answer: "ข" },
            { id: 4,  qText: "รหัสลับคือไร", code: null, options: [{key:"ก",text:"ผักตบชวา"},
            {key:"ข",text:"ผักกาด"},
            {key:"ค",text:"อำยัมมันแหย่มันย้อ"},
            {key:"ง",text:"Paigum007"}],
            answer: "ก" },
            { id: 5,  qText: "กมลเคยอยู่แรงค์อะไรใน Call of Duty Mobile", code: null, options: [{key:"ก",text:"Rookie (แรงค์ที่กากสุด)"},
            {key:"ข",text:"Master (รองจาก Grandmaster)"},
            {key:"ค",text:"Grandmaster (แรงค์เกือบโหดสุด)"},
            {key:"ง",text:"Legendary (แรงค์โหดสุด)"}],
            answer: "ง" },
            { id: 6,  qText: "เฉลิมศักดิ์ย้ายไปตอนไหน", code: null, options: [{key:"ก",text:"ป.3"},

            {key:"ง",text:"ป.6"}],
            answer: "ค" },
            { id: 7,  qText: "กมลเคยชอบใคร", code: null, options: [{key:"ก",text:"ตะวัน"},
            {key:"ข",text:"แม่เบสท์"},
            {key:"ค",text:"โฟลคหญิง"},
            {key:"ง",text:"โฟลคชาย"}],
            answer: "ค" },
            { id: 8,  qText: "ธนวัฒน์สูงเท่าไหร", code: null, options: [{key:"ก",text:"120-130"},
            {key:"ข",text:"131-140"},

            {key:"ง",text:"150+"}],
            answer: "ข" },
            { id: 9,  qText: "กมลซ้อมวันไหนบ้าง", code: null, options: [{key:"ก",text:"เสาร์ - อาทิตย์"},
            {key:"ข",text:"พฤหัสบดี - ศุกร์"},
            {key:"ค",text:"พฤหัสบดี - อาทิตย์"},
            {key:"ง",text:"ทุกวัน"}],
            answer: "ข" },
            { id: 10,  qText: "เบสท์ชอบใคร", code: null, options: [{key:"ก",text:"ตะนอย"},
            {key:"ข",text:"กัสจัง"},
            {key:"ค",text:"ซูกัส"},
            {key:"ง",text:"ฟองโฟม"}],
            answer: "ก" },
            { id: 11,  qText: "ตุลาคมเก่งวิชาอะไร", code: null, options: [{key:"ก",text:"คณิตศาสตร์"},
            {key:"ข",text:"วิทยาศาสตร์"},
            {key:"ค",text:"ภาษาไทย"},
            {key:"ง",text:"ทุกวิชา"}],
            answer: "ก" },
            { id: 12,  qText: "ใครเป็นคนสร้างสเมิร์ฟทู", code: null, options: [{key:"ก",text:"กมล"},
            {key:"ข",text:"เฉลิมศักดิ"},
            {key:"ค",text:"ตุลาคม"},
            {key:"ง",text:"เบสท์"}],
            answer: "ข" },
            { id: 13,  qText: "ชนาทิป", code: null, options: [{key:"ก",text:"-1"},
            {key:"ข",text:"0"},
            {key:"ค",text:"1"},
            {key:"ง",text:"2"}],
            answer: "ง" },
            { id: 14,  qText: "ตุลาคมเกิดวัน/เดือนไหน", code: null, options: [{key:"ก",text:"9/9"},
            {key:"ข",text:"10/10"},
            {key:"ค",text:"15/10"},
            {key:"ง",text:"11/10"}],
            answer: "ข" },
            { id: 15,  qText: "เฉลิมศักดิ์ตัดผมทรงไร", code: null, options: [{key:"ก",text:"ทูบล็อค"},
            {key:"ข",text:"รองทรง"},
            {key:"ค",text:"กระลาครอบ"},
            {key:"ง",text:"แสกกลาง"}],
            answer: "ค" },
        ];

        // ------------------ GLOBAL APPLICATION STATE ------------------
        let currentScreen = 'home';
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let studentInfo = { uid: '', name: '' };
        let examTimer = null;
        let timeRemaining = 9999;

        // Keeps track of the record currently open in the review modal.
        // Only the student's OWN just-submitted result (this session) and the
        // Admin dashboard can open the per-question review; the public UID
        // lookup on the homepage intentionally only ever shows the total score.
        let lastSubmittedRecord = null;

        // Initialize App
        window.onload = function() {
            buildNavGrid();
            switchScreen('home');
        };

        // ------------------ FIRESTORE DATA HELPERS ------------------
        async function getAllRecords() {
            const snap = await getDocs(collection(db, SCORES_COLLECTION));
            const records = [];
            snap.forEach(d => records.push({ uid: d.id, ...d.data() }));
            return records;
        }

        async function getRecordByUid(uid) {
            const ref = doc(db, SCORES_COLLECTION, uid);
            const snap = await getDoc(ref);
            return snap.exists() ? { uid: snap.id, ...snap.data() } : null;
        }

        // Build the 1-15 navigation button grid
        function buildNavGrid() {
            const grid = document.getElementById('nav-btn-grid');
            grid.innerHTML = '';
            EXAM_QUESTIONS.forEach(q => {
                const btn = document.createElement('button');
                btn.id = `nav-btn-${q.id}`;
                btn.textContent = q.id;
                btn.onclick = () => jumpToQuestion(q.id);
                btn.className = "h-9 rounded-lg font-semibold text-sm transition border flex items-center justify-center bg-slate-100 border-slate-200 text-slate-700";
                grid.appendChild(btn);
            });
        }

        // Helper to change displays smoothly
        function switchScreen(screenId) {
            currentScreen = screenId;
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.add('hidden');
            document.getElementById('screen-admin').classList.add('hidden');

            document.getElementById('screen-' + screenId).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (screenId === 'home') {
                clearInterval(examTimer);
                document.getElementById('form-register').reset();
            }
        }

        // ------------------ QUIZ INTAKE / START ------------------
        async function startQuiz(event) {
            event.preventDefault();

            const uid = document.getElementById('reg-uid').value.trim().toUpperCase();
            const name = document.getElementById('reg-name').value.trim();

            if (!uid || !name) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนเข้าห้องสอบ");
                return;
            }

            // UID uniqueness check: if this UID has already submitted a result,
            // block starting the exam again under the same ID.
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch spin"></i> กำลังตรวจสอบ User ID...`;

            let existing;
            try {
                existing = await getRecordByUid(uid);
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่อีกครั้ง\n" + (e && e.message ? e.message : e));
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
                return;
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHtml;

            if (existing) {
                alert(`User ID "${uid}" นี้ได้ทำข้อสอบและถูกบันทึกผลไปแล้วก่อนหน้านี้\nแต่ละ User ID สามารถทำข้อสอบได้เพียงครั้งเดียวเท่านั้น\nหากคิดว่าเป็นข้อผิดพลาด กรุณาติดต่อครูผู้คุมสอบ`);
                return;
            }

            studentInfo.uid = uid;
            studentInfo.name = name;

            userAnswers = {};
            currentQuestionIndex = 0;

            document.getElementById('quiz-student-info').innerHTML = `<i class="fa-solid fa-user"></i> ${studentInfo.name}`;
            document.getElementById('quiz-student-uid').textContent = studentInfo.uid;

            timeRemaining = 9999;
            updateTimerDisplay();
            clearInterval(examTimer);
            examTimer = setInterval(function() {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(examTimer);
                    alert("หมดเวลาทำข้อสอบแล้ว! ระบบจะทำการตรวจคะแนนอัตโนมัติจากคำตอบที่บันทึกไว้");
                    submitQuizAnswers(true);
                }
            }, 1000);

            renderQuestion();
            switchScreen('quiz');
        }

        function updateTimerDisplay() {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            document.getElementById('quiz-timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // ------------------ EXAM INTERACTION LAYOUT ------------------
        function renderQuestion() {
            const q = EXAM_QUESTIONS[currentQuestionIndex];

            document.getElementById('quiz-q-num').textContent = `คำถามข้อที่ ${q.id} จาก 15 ข้อ`;
            document.getElementById('quiz-q-text').textContent = q.qText;

            const codeBox = document.getElementById('quiz-code-box');
            if (q.code) {
                codeBox.classList.remove('hidden');
                document.getElementById('quiz-code-content').textContent = q.code;
            } else {
                codeBox.classList.add('hidden');
            }

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            const selectedAnswer = userAnswers[q.id];

            q.options.forEach(opt => {
                const isSelected = selectedAnswer === opt.key;
                const optionDiv = document.createElement('div');
                optionDiv.onclick = () => selectOption(q.id, opt.key);
                optionDiv.className = `p-4 rounded-xl border-2 transition-all duration-150 cursor-pointer flex items-center justify-between ${
                    isSelected
                    ? 'border-indigo-600 bg-indigo-50/70 text-indigo-950 font-semibold'
                    : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50 text-slate-700'
                }`;

                optionDiv.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm font-bold ${
                            isSelected ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-500 border-slate-300'
                        }">
                            ${opt.key}
                        </span>
                        <span>${opt.text}</span>
                    </div>
                    ${isSelected ? '<i class="fa-solid fa-circle-check text-indigo-600 text-lg"></i>' : ''}
                `;
                optionsContainer.appendChild(optionDiv);
            });

            const prevBtn = document.getElementById('btn-prev-q');
            const nextBtn = document.getElementById('btn-next-q');

            if (currentQuestionIndex === 0) {
                prevBtn.classList.add('opacity-40', 'cursor-not-allowed');
                prevBtn.disabled = true;
            } else {
                prevBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                prevBtn.disabled = false;
            }

            if (currentQuestionIndex === EXAM_QUESTIONS.length - 1) {
                nextBtn.innerHTML = `ทบทวนผลสอบ <i class="fa-solid fa-circle-info"></i>`;
            } else {
                nextBtn.innerHTML = `ข้อถัดไป <i class="fa-solid fa-arrow-right"></i>`;
            }

            updateQuestionMapHighlight();
        }

        function selectOption(qId, key) {
            userAnswers[qId] = key;
            renderQuestion();
        }

        function jumpToQuestion(qNum) {
            currentQuestionIndex = qNum - 1;
            renderQuestion();
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < EXAM_QUESTIONS.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                alert("คุณทำมาถึงข้อสุดท้ายแล้ว กรุณาตรวจสอบแผนผังความสมบูรณ์และกดปุ่ม 'ส่งคำตอบตรวจผลสอบ' สีแดงเพื่อตรวจคะแนน");
            }
        }

        function updateQuestionMapHighlight() {
            for (let i = 1; i <= EXAM_QUESTIONS.length; i++) {
                const btn = document.getElementById(`nav-btn-${i}`);
                const isSelected = userAnswers[i] !== undefined;
                const isActive = (i - 1) === currentQuestionIndex;

                let classes = "h-9 rounded-lg font-semibold text-sm transition border flex items-center justify-center";
                classes += isSelected
                    ? " bg-indigo-600 border-indigo-600 text-white font-bold"
                    : " bg-slate-100 border-slate-200 text-slate-700";
                if (isActive) {
                    classes += " ring-4 ring-indigo-300 scale-105";
                }
                btn.className = classes;
            }
        }

        // ------------------ SUBMIT & GRADING SYSTEM ------------------
        function confirmSubmitQuiz() {
            const unansweredCount = EXAM_QUESTIONS.length - Object.keys(userAnswers).length;
            let confirmationMsg = "ต้องการส่งคำตอบเพื่อประเมินผลสอบจริงหรือไม่?";

            if (unansweredCount > 0) {
                confirmationMsg = `แจ้งเตือน: คุณยังไม่ได้ทำข้อสอบอีก ${unansweredCount} ข้อ! ต้องการส่งคำตอบเพื่อตรวจคะแนนจริงหรือไม่?`;
            }

            if (confirm(confirmationMsg)) {
                submitQuizAnswers(false);
            }
        }

        async function submitQuizAnswers(isForced = false) {
            clearInterval(examTimer);

            let totalScore = 0;
            EXAM_QUESTIONS.forEach(q => {
                const userAns = userAnswers[q.id];
                if (q.answer && userAns === q.answer) {
                    totalScore++;
                }
            });

            const scoreRecord = {
                uid: studentInfo.uid,
                name: studentInfo.name,
                total: totalScore,
                answers: { ...userAnswers },
                submittedAt: new Date().toLocaleString('th-TH')
            };

            // Write the result inside a Firestore transaction: read the doc, and
            // ONLY create it if it doesn't already exist. This makes the UID
            // uniqueness rule airtight even if two tabs/devices raced past the
            // earlier check in startQuiz() at nearly the same moment — Firestore
            // guarantees the transaction that reads "not exists" wins the write,
            // and the other one is rejected.
            try {
                await runTransaction(db, async (transaction) => {
                    const ref = doc(db, SCORES_COLLECTION, studentInfo.uid);
                    const snap = await transaction.get(ref);
                    if (snap.exists()) {
                        throw new Error('DUPLICATE_UID');
                    }
                    transaction.set(ref, scoreRecord);
                });
            } catch (e) {
                if (e && e.message === 'DUPLICATE_UID') {
                    alert(`User ID "${studentInfo.uid}" นี้มีผลสอบถูกบันทึกไปแล้ว ไม่สามารถส่งคำตอบซ้ำได้\nกรุณาติดต่อครูผู้คุมสอบหากคิดว่าเป็นข้อผิดพลาด`);
                    switchScreen('home');
                    return;
                }
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการบันทึกคะแนนลง Firebase กรุณาลองใหม่อีกครั้ง\n" + (e && e.message ? e.message : e));
                return;
            }

            lastSubmittedRecord = scoreRecord;

            document.getElementById('result-total-score').textContent = totalScore;
            document.getElementById('result-user-summary').innerHTML = `
                ผลการสอบของ <strong>${studentInfo.name}</strong>
                (User ID: <span class="font-mono text-xs font-bold">${studentInfo.uid}</span>) ได้รับการบันทึกแล้ว
            `;

            const ring = document.getElementById('score-ring-color');
            const passBadge = document.getElementById('result-pass-badge');

            if (totalScore >= 10) {
                ring.className = "mx-auto w-36 h-36 md:w-44 md:h-44 rounded-full border-8 border-emerald-500 bg-emerald-50/30 flex flex-col items-center justify-center shadow-lg";
                passBadge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-bold bg-emerald-100 text-emerald-800";
                passBadge.innerHTML = `<i class="fa-solid fa-circle-check"></i> ผ่านเกณฑ์การประเมิน (ผ่าน)`;
            } else {
                ring.className = "mx-auto w-36 h-36 md:w-44 md:h-44 rounded-full border-8 border-rose-500 bg-rose-50/30 flex flex-col items-center justify-center shadow-lg";
                passBadge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-bold bg-rose-100 text-rose-800";
                passBadge.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ไม่ผ่านเกณฑ์ขั้นต่ำ (ปรับปรุง)`;
            }

            switchScreen('result');
        }

        function backToHome() {
            switchScreen('home');
        }

        // ------------------ SCORE LOOKUP COMPONENT ------------------
        async function lookupUserScore() {
            const searchUid = document.getElementById('lookup-uid').value.trim().toUpperCase();
            if (!searchUid) {
                alert("กรุณากรอก User ID ที่ต้องการสืบค้น");
                return;
            }

            let result;
            try {
                result = await getRecordByUid(searchUid);
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่อีกครั้ง");
                return;
            }

            const box = document.getElementById('lookup-result-box');

            if (result) {
                box.classList.remove('hidden');
                document.getElementById('lookup-name').textContent = result.name;
                document.getElementById('lookup-score').textContent = `${result.total} / 15`;

                const badge = document.getElementById('lookup-badge');
                if (result.total >= 10) {
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-emerald-500 text-slate-950";
                    badge.textContent = "ผ่าน";
                } else {
                    badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-rose-500 text-white";
                    badge.textContent = "ปรับปรุง";
                }
            } else {
                box.classList.add('hidden');
                alert(`ไม่พบประวัติผลการสอบสำหรับ User ID: ${searchUid} ในระบบ`);
            }
        }

        // ------------------ ANSWER REVIEW MODAL (shared by result page / admin) ------------------
        // Public UID lookup deliberately does NOT open this — it only ever
        // shows the total score. Per-question detail is available to the
        // student only right after they submit (their own current session),
        // and to the teacher via the Admin dashboard.
        function openReviewFromResult() {
            if (lastSubmittedRecord) {
                openReviewModal(lastSubmittedRecord);
            }
        }

        function openReviewModal(record) {
            const modal = document.getElementById('review-modal');
            const body = document.getElementById('review-modal-body');
            const subtitle = document.getElementById('review-modal-subtitle');

            subtitle.textContent = `${record.name} · User ID: ${record.uid} · คะแนน ${record.total}/15`;
            body.innerHTML = '';

            const answers = record.answers || {};

            EXAM_QUESTIONS.forEach(q => {
                const userAns = answers[q.id];
                const isCorrect = userAns === q.answer;
                const wasAnswered = userAns !== undefined;

                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border-2 ${
                    !wasAnswered ? 'border-slate-200 bg-slate-50' :
                    isCorrect ? 'border-emerald-200 bg-emerald-50/60' : 'border-rose-200 bg-rose-50/60'
                }`;

                const optionRows = q.options.map(opt => {
                    const isUserChoice = opt.key === userAns;
                    const isCorrectChoice = opt.key === q.answer;
                    let rowClass = "flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm";
                    if (isCorrectChoice) {
                        rowClass += " bg-emerald-100 text-emerald-800 font-semibold";
                    } else if (isUserChoice && !isCorrectChoice) {
                        rowClass += " bg-rose-100 text-rose-800 font-semibold";
                    } else {
                        rowClass += " text-slate-500";
                    }
                    let iconHtml = '';
                    if (isCorrectChoice) {
                        iconHtml = '<i class="fa-solid fa-check text-emerald-600"></i>';
                    } else if (isUserChoice) {
                        iconHtml = '<i class="fa-solid fa-xmark text-rose-600"></i>';
                    } else {
                        iconHtml = '<span class="w-3.5"></span>';
                    }
                    return `<div class="${rowClass}">${iconHtml}<span>${opt.key}. ${opt.text}</span></div>`;
                }).join('');

                const statusBadge = !wasAnswered
                    ? `<span class="px-2 py-0.5 rounded text-xs font-bold bg-slate-200 text-slate-600">ไม่ได้ตอบ</span>`
                    : isCorrect
                        ? `<span class="px-2 py-0.5 rounded text-xs font-bold bg-emerald-500 text-white">ถูกต้อง</span>`
                        : `<span class="px-2 py-0.5 rounded text-xs font-bold bg-rose-500 text-white">ไม่ถูกต้อง</span>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start gap-3 mb-2.5">
                        <p class="font-bold text-slate-800 text-sm">ข้อ ${q.id}. ${q.qText}</p>
                        ${statusBadge}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                        ${optionRows}
                    </div>
                `;
                body.appendChild(card);
            });

            modal.classList.remove('hidden');
        }

        function closeReviewModal() {
            document.getElementById('review-modal').classList.add('hidden');
        }

        // ------------------ TEACHER ADMIN DASHBOARD ------------------
        function openAdminModal() {
            document.getElementById('admin-auth-modal').classList.remove('hidden');
            document.getElementById('admin-passcode-input').focus();
            document.getElementById('admin-auth-error').classList.add('hidden');
        }

        function closeAdminModal() {
            document.getElementById('admin-auth-modal').classList.add('hidden');
            document.getElementById('admin-passcode-input').value = '';
        }

        function submitAdminAuth() {
            const pw = document.getElementById('admin-passcode-input').value;
            if (pw === '1122') {
                closeAdminModal();
                loadAdminDashboard();
                switchScreen('admin');
            } else {
                document.getElementById('admin-auth-error').classList.remove('hidden');
            }
        }

        async function loadAdminDashboard() {
            const indicator = document.getElementById('admin-loading-indicator');
            indicator.classList.remove('hidden');
            let records = [];
            try {
                records = await getAllRecords();
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูลจาก Firebase: " + (e && e.message ? e.message : e));
            }
            renderAdminStats(records);
            renderAdminTable(records);
            indicator.classList.add('hidden');
        }

        function renderAdminStats(records) {
            const totalStudents = records.length;

            if (totalStudents === 0) {
                document.getElementById('admin-stat-total').textContent = "0 คน";
                document.getElementById('admin-stat-avg').textContent = "0.0 คะแนน";
                document.getElementById('admin-stat-pass-rate').textContent = "0%";
                document.getElementById('admin-stat-max').textContent = "0 คะแนน";
                return;
            }

            const totalScoreSum = records.reduce((sum, r) => sum + r.total, 0);
            const averageScore = (totalScoreSum / totalStudents).toFixed(1);

            const passedCount = records.filter(r => r.total >= 10).length;
            const passRate = Math.round((passedCount / totalStudents) * 100);

            const maxScore = Math.max(...records.map(r => r.total));

            document.getElementById('admin-stat-total').textContent = `${totalStudents} คน`;
            document.getElementById('admin-stat-avg').textContent = `${averageScore} คะแนน`;
            document.getElementById('admin-stat-pass-rate').textContent = `${passRate}%`;
            document.getElementById('admin-stat-max').textContent = `${maxScore} คะแนน`;
        }

        // Keeps the currently loaded admin records around so a click on
        // "ดูคำตอบ" can locate the right record by uid without re-fetching.
        let adminCachedRecords = [];

        function renderAdminTable(records) {
            adminCachedRecords = records;
            const sorted = records.slice().sort((a, b) => b.total - a.total);

            const tbody = document.getElementById('admin-table-rows');
            const emptyState = document.getElementById('admin-empty-state');
            tbody.innerHTML = '';

            if (sorted.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            sorted.forEach(student => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50/50 transition-colors";

                const statusColor = student.total >= 10 ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200';
                const statusText = student.total >= 10 ? 'ผ่าน' : 'ปรับปรุง';

                row.innerHTML = `
                    <td class="py-3 px-4 text-center font-mono text-xs font-bold text-slate-900 bg-slate-50 rounded-lg border border-slate-100">${student.uid}</td>
                    <td class="py-3 px-4 font-semibold text-slate-900">${student.name}</td>
                    <td class="py-3 px-4 text-center font-extrabold text-indigo-700 text-base">${student.total} / 15</td>
                    <td class="py-3 px-4 text-center">
                        <span class="px-2.5 py-1 text-xs font-extrabold rounded-full border ${statusColor}">
                            ${statusText}
                        </span>
                    </td>
                    <td class="py-3 px-4 text-center text-xs text-slate-400 font-medium">${student.submittedAt}</td>
                    <td class="py-3 px-4 text-center">
                        <button onclick="openReviewFromAdmin('${student.uid}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 mx-auto border border-indigo-100">
                            <i class="fa-solid fa-eye"></i> ดูคำตอบ
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function openReviewFromAdmin(uid) {
            const record = adminCachedRecords.find(r => r.uid === uid);
            if (record) {
                openReviewModal(record);
            }
        }

        // ------------------ EXPORT DATA TO EXCEL (CSV) ------------------
        async function exportToExcel() {
            let records = [];
            try {
                records = await getAllRecords();
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูลจาก Firebase: " + (e && e.message ? e.message : e));
                return;
            }
            records.sort((a, b) => b.total - a.total);

            if (records.length === 0) {
                alert(`ยังไม่มีข้อมูลผลการสอบสำหรับออกรายงาน Excel`);
                return;
            }

            let csvContent = "\ufeff";
            csvContent += "User ID,ชื่อ,คะแนนรวม (15 คะแนน),สถานะการประเมิน,วันเวลาทำข้อสอบ\n";

            records.forEach(student => {
                const statusText = student.total >= 10 ? "ผ่าน" : "ปรับปรุง";
                const safeName = String(student.name).replace(/"/g, '""');
                csvContent += `${student.uid},"${safeName}",${student.total},${statusText},${student.submittedAt}\n`;
            });

            const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
            const link = document.createElement("a");

            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `คะแนนสอบ.csv`);
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }

        // Inject Mock Data (Allows teachers to preview report functionality instantly)
        async function injectMockData() {
            const firstNames = ["กิตติภพ", "จิรพัฒน์", "ชยุตม์", "ธนพัตน์", "ปกรณ์เกียรติ", "รัชพล", "พีรพล", "ชลสิทธิ์", "ณัฐพงษ์", "มนัสวี", "วรัญญา", "ชลดา", "ทิพยวรรณ", "ขวัญจิรา", "กัญญารัตน์", "พิมพิกา"];
            const lastNames = ["สมบูรณ์", "ดีเลิศ", "แสนดี", "วงศ์ษา", "รุ่งเรือง", "ชื่นชม", "มณีรนิต", "แสงทอง", "สุขใจ", "บุญธรรม", "แก้วงาม", "นามดี", "ยอดรัก", "ทรงเดช", "ศรีบุญ", "เกิดผล"];

            let existingRecords;
            try {
                existingRecords = await getAllRecords();
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase: " + (e && e.message ? e.message : e));
                return;
            }
            const existingUids = new Set(existingRecords.map(r => r.uid));

            const batch = writeBatch(db);
            let addedCount = 0;

            for (let i = 0; i < 15; i++) {
                const uidNum = Math.floor(Math.random() * 9000) + 1000;
                const uid = `UID${uidNum}`;

                if (existingUids.has(uid)) continue;
                existingUids.add(uid);

                const namePrefix = Math.random() > 0.5 ? "เด็กชาย" : "เด็กหญิง";
                const fullName = `${namePrefix}${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;

                // Generate a plausible mock answer sheet so "ดูคำตอบ" also works
                // for the randomly-injected demo students, not just real submissions.
                const mockAnswers = {};
                EXAM_QUESTIONS.forEach(q => {
                    const keys = q.options.map(o => o.key);
                    mockAnswers[q.id] = keys[Math.floor(Math.random() * keys.length)];
                });
                const total = EXAM_QUESTIONS.reduce((sum, q) => sum + (mockAnswers[q.id] === q.answer ? 1 : 0), 0);

                const submitTime = new Date(Date.now() - Math.random() * 36000000).toLocaleString('th-TH');

                const ref = doc(db, SCORES_COLLECTION, uid);
                batch.set(ref, { uid, name: fullName, total, answers: mockAnswers, submittedAt: submitTime });
                addedCount++;
            }

            if (addedCount === 0) {
                alert("สุ่ม User ID ซ้ำกับที่มีอยู่แล้วทั้งหมด ลองกดปุ่มนี้ซ้ำอีกครั้ง");
                return;
            }

            try {
                await batch.commit();
                await loadAdminDashboard();
                alert("สุ่มจำลองข้อมูลผู้เข้าสอบ เรียบร้อยแล้ว!");
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลจำลอง: " + (e && e.message ? e.message : e));
            }
        }

        async function clearAllScores() {
            if (!confirm("คุณแน่ใจว่าต้องการล้างฐานข้อมูลผลสอบของนักเรียนทั้งหมด? (ข้อมูลนี้จะไม่สามารถกู้คืนได้)")) {
                return;
            }
            try {
                const snap = await getDocs(collection(db, SCORES_COLLECTION));
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                await loadAdminDashboard();
                alert("ล้างฐานข้อมูลประวัติสอบทั้งหมดสำเร็จ");
            } catch (e) {
                console.error('Firestore error:', e);
                alert("เกิดข้อผิดพลาดในการล้างฐานข้อมูล: " + (e && e.message ? e.message : e));
            }
        }

        // ------------------ EXPOSE FUNCTIONS REFERENCED BY INLINE onclick/onsubmit ------------------
        // This script runs as a module (needed for the Firebase "import" syntax
        // above), and module scope is NOT automatically global — so every
        // function an HTML tag calls via onclick="..." / onsubmit="..." must be
        // attached to window explicitly, or the browser can't find it.
        window.switchScreen = switchScreen;
        window.startQuiz = startQuiz;
        window.prevQuestion = prevQuestion;
        window.nextQuestion = nextQuestion;
        window.confirmSubmitQuiz = confirmSubmitQuiz;
        window.backToHome = backToHome;
        window.lookupUserScore = lookupUserScore;
        window.openReviewFromResult = openReviewFromResult;
        window.closeReviewModal = closeReviewModal;
        window.openAdminModal = openAdminModal;
        window.closeAdminModal = closeAdminModal;
        window.submitAdminAuth = submitAdminAuth;
        window.injectMockData = injectMockData;
        window.clearAllScores = clearAllScores;
        window.exportToExcel = exportToExcel;
        window.openReviewFromAdmin = openReviewFromAdmin;
    </script>
